name: Docker Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ================== 1. 拉代码 ==================
      - name: Checkout
        uses: actions/checkout@v4

      # ================== 2. 启用 Buildx（缓存核心） ==================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ================== 3. 登录 DockerHub ==================
      - name: Login to DockerHub
        if: github.event_name == 'push'   # ✅ 只在 push 时登录（避免 PR 泄露）
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ================== 4. 构建 & 推送 ==================
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile

          # ✅ 只有 push 才 push 镜像
          push: ${{ github.event_name == 'push' }}

          # ✅ 镜像标签（推荐双 tag）
          tags: |
            ${{ vars.DOCKER_IMAGE_NAME }}
            ${{ vars.DOCKER_IMAGE_NAME }}:${{ github.sha }}

          # 🚀 关键：缓存加速（提升 2~5 倍）
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ================== 5. 构建时间统计 ==================
      - name: Record Build Time
        if: success()
        run: |
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      # ================== 6. Slack 通知 ==================
      - name: Send Slack Notification
        if: success() && github.event_name == 'push'
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          IMAGE: ${{ vars.DOCKER_IMAGE_NAME }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"🚀 *Docker Build Success*\n*Repo:* $GITHUB_REPOSITORY\n*Branch:* $GITHUB_REF_NAME\n*Image:* $IMAGE\n*By:* $GITHUB_ACTOR\",
            \"attachments\": [
              {
                \"title\": \"Details\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"$GITHUB_REF_NAME\", \"short\": true},
                  {\"title\": \"Actor\", \"value\": \"$GITHUB_ACTOR\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"$COMMIT_MESSAGE\", \"short\": false},
                  {\"title\": \"Run\", \"value\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }
            ]
          }" $SLACK_WEBHOOK_URL

      # ================== 7. 记录到 PullBot ==================
      - name: Record Result to PullBot Repo
        if: success() && github.event_name == 'push'
        env:
          PULLBOT_TOKEN: ${{ secrets.PULLBOT_TOKEN }}
          TARGET_REPO: "share2024/pullbot"
          ORIGIN_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          FILE_PATH="logs.json"
          API_URL="https://api.github.com/repos/${TARGET_REPO}/contents/${FILE_PATH}"

          HTTP_STATUS=$(curl -o old.json -s -w "%{http_code}" \
            -H "Authorization: token ${PULLBOT_TOKEN}" \
            "${API_URL}")

          if [ "$HTTP_STATUS" = "200" ]; then
            FILE_SHA=$(jq -r '.sha' old.json)
            CONTENT=$(jq -r '.content' old.json | base64 --decode)
          else
            FILE_SHA=""
            CONTENT="[]"
          fi

          DIFF_URL="https://github.com/${ORIGIN_REPO}/commit/${COMMIT_SHA}"

          UPDATED=$(echo "$CONTENT" | jq \
            --arg repo "$ORIGIN_REPO" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg commit "$COMMIT_MSG" \
            --arg sha "$COMMIT_SHA" \
            --arg diff "$DIFF_URL" \
            --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '. += [{
              "repo": $repo,
              "branch": $branch,
              "actor": $actor,
              "commit_message": $commit,
              "commit_sha": $sha,
              "diff_url": $diff,
              "timestamp": $time
            }]'
          )

          ENCODED=$(echo "$UPDATED" | base64 -w 0)

          curl -X PUT "$API_URL" \
            -H "Authorization: token ${PULLBOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"message\": \"Record CI result: ${COMMIT_SHA}\",
              \"content\": \"${ENCODED}\",
              \"sha\": \"${FILE_SHA}\"
            }"